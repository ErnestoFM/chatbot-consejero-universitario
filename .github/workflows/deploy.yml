name: Despliegue a Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  # 1. PRIMER TRABAJO: Ejecutar las pruebas
  test:
    name: Validar Tests (TDD)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

  # 2. SEGUNDO TRABAJO: Desplegar (Solo si el primero pasa)
  deploy:
    name: Desplegar a Producción
    runs-on: ubuntu-latest
    needs: test # <--- ESTA ES LA REGLA DE ORO

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Descargar configuración del entorno de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Construir el proyecto (Build)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar a Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
